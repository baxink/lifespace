<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <title>物品详情 - 家庭物品清单</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="detail">
  <div class="container container-full">
    <!-- 头部 -->
    <header class="header">
      <div class="header-actions">
        <button class="back-btn" onclick="window.location.href='index.html'">← 返回</button>
        <h1 style="flex:1;margin:0;">物品详情</h1>
      </div>
    </header>

    <!-- 未找到 -->
    <div class="container" id="notFound" style="display:none;padding-top:3rem;text-align:center;">
      <div style="font-size:5rem;margin-bottom:1rem;">❓</div>
      <div style="font-size:var(--font-size-lg);margin-bottom:1rem;">物品不存在</div>
      <button class="btn btn-primary" onclick="window.location.href='index.html'">返回首页</button>
    </div>

    <!-- 详情内容 -->
    <div id="itemDetail">
      <div class="detail-image" id="detailImage"></div>

      <div class="detail-content">
        <h2 class="detail-name" id="detailName"></h2>

        <div class="detail-location">
          <span class="detail-location-icon">📍</span>
          <span id="detailLocation"></span>
        </div>

        <div class="detail-meta" id="detailMeta"></div>

        <div class="detail-actions">
          <button class="btn btn-primary btn-block" id="editBtn">
            ✏️ 编辑物品
          </button>
          <button class="btn btn-danger btn-block" id="deleteBtn">
            🗑️ 删除物品
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 删除确认模态框 -->
  <div class="modal" id="deleteModal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">确认删除</span>
        <button class="modal-close" onclick="document.getElementById('deleteModal').style.display='none'">×</button>
      </div>
      <div class="modal-body">
        <p style="font-size:var(--font-size-base);">确定要删除这个物品吗？此操作无法撤销。</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelDeleteBtn" style="flex:1;">取消</button>
        <button class="btn btn-danger" id="confirmDeleteBtn" style="flex:1;">删除</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
